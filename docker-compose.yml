services:
  sqldata:
    build:
      context: .
      dockerfile: db.dockerfile
    image: patientstesttask.db
    ports:
      - "1433:1433"
    container_name: sqldata
    volumes:
      - sqlserverdata:/var/opt/mssql

  web:
    build:
      context: .
      dockerfile: web.dockerfile
    image: patientstesttask.web
    ports:
      - "5000:8080"
    container_name: web
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging
    depends_on:
      - sqldata
      
volumes:
  sqlserverdata: